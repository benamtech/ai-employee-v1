name: Apply Reviewed Consumer Closure

on:
  push:
    branches:
      - employee-production-tuesday
    paths:
      - ".github/workflows/apply-reviewed-consumer-closure.yml"

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[consumer-closure-applied]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: employee-production-tuesday
          fetch-depth: 0
      - name: Apply exact reviewed source patch
        env:
          PATCH_B64: ""
        run: |
          echo "$PATCH_B64" | base64 -d | gzip -d > /tmp/consumer-closure.patch
          git apply --check /tmp/consumer-closure.patch
          git apply /tmp/consumer-closure.patch
      - name: Remove temporary materialization and self
        run: |
          python - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/employee-work-production-boundary.yml')
          text = workflow.read_text()
          start = text.find('      - name: Upload exact Manager source for structural review\n')
          if start >= 0:
              end = text.find('      - name: Production image inclusion\n', start)
              if end < 0:
                  raise SystemExit('production image step marker missing')
              text = text[:start] + text[end:]
              workflow.write_text(text)
          PY
          rm -f .github/workflows/temporary-source-materialization.yml
          rm -f .github/workflows/apply-reviewed-consumer-closure.yml
      - name: Commit reviewed closure
        run: |
          git config user.name "benamtech-automation"
          git config user.email "automation@users.noreply.github.com"
          git add -A
          git commit -m "close S1-S4 live Manager assignment consumers [consumer-closure-applied]"
          git push origin HEAD:employee-production-tuesday
