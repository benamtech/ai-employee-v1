name: One-shot S8 Admin Library Closure

on:
  push:
    branches:
      - employee-production-tuesday
    paths:
      - ".github/workflows/apply-s8-admin-library-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: employee-production-tuesday
      - name: Apply reviewed source-only patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('mvp-build/apps/manager/src/lib/admin.ts')
          text = path.read_text()
          start = text.index('export async function requirePlatformRole(')
          end = text.index('function employeeHealth(', start)
          text = text[:start] + '''export async function requirePlatformRole(\n  _db: SupabaseClient,\n  _input: { platform_user_id?: string | null; minimum?: PlatformRole },\n): Promise<{ ok: true; actor: AdminActor } | { ok: false; status: number; error: string }> {\n  return { ok: false, status: 403, error: "legacy_platform_authority_disabled" };\n}\n\nexport async function recordSupportAccess(\n  _db: SupabaseClient,\n  _actor: AdminActor,\n  _input: { account_id: string; reason?: string | null; action: string; employee_id?: string | null },\n): Promise<{ ok: true; audit_id: string } | { ok: false; status: number; error: string }> {\n  return { ok: false, status: 403, error: "legacy_support_session_disabled" };\n}\n\n''' + text[end:]

          text = text.replace('''    platform_user_id: actor.platform_user_id,\n    role: actor.role,\n    account_id: input.account_id,''', '''    platform_user_id: actor.platform_user_id,\n    platform_principal_id: actor.platform_principal_id ?? null,\n    platform_session_id: actor.platform_session_id ?? null,\n    support_lease_id: actor.support_lease_id ?? null,\n    assignment_id: actor.assignment_id ?? null,\n    role: actor.role,\n    account_id: input.account_id,''')
          text = text.replace('''    account_id: input.account_id,\n    employee_id: input.employee_id ?? null,\n    actor: "manager",\n    action: `admin:${input.action}`,''', '''    account_id: input.account_id,\n    employee_id: input.employee_id ?? null,\n    assignment_id: actor.assignment_id ?? null,\n    actor: "manager",\n    action: `admin:${input.action}`,''')

          needle = '''export async function runAdminSupportAction(db: SupabaseClient, actor: AdminActor, input: AdminSupportActionInput): Promise<AdminSupportActionResult> {\n  if (!input.reason || input.reason.trim().length < 8) {'''
          replacement = '''export async function runAdminSupportAction(db: SupabaseClient, actor: AdminActor, input: AdminSupportActionInput): Promise<AdminSupportActionResult> {\n  if (!actor.platform_principal_id || !actor.platform_session_id || !actor.support_lease_id || !actor.assignment_id || !actor.authenticated_by) {\n    return { status: "denied", action: input.action, changed_resources: [], proof: { reason: "durable_platform_authority_required" }, user_facing_summary_hint: "Durable platform authority is required." };\n  }\n  if (actor.assignment_id !== input.assignment_id) {\n    return { status: "denied", action: input.action, changed_resources: [], proof: { reason: "platform_assignment_scope_mismatch" }, user_facing_summary_hint: "The support lease does not cover this assignment." };\n  }\n  if (!input.reason || input.reason.trim().length < 8 || input.reason !== actor.support_reason) {'''
          if needle not in text: raise SystemExit('runAdminSupportAction anchor missing')
          text = text.replace(needle, replacement)

          text = text.replace('''const minted = await mintEmployeeMcpCredential(db, { account_id: input.account_id, employee_id: input.employee_id! });''', '''const minted = await mintEmployeeMcpCredential(db, { account_id: input.account_id, employee_id: input.employee_id!, assignment_id: input.assignment_id });''')

          text = text.replace('''const outcome = await runManagerTool("redeliver_employee_event", { event_id: input.event_id, channel: "sms" }, { actor: "manager" });''', '''const outcome = await runManagerTool("redeliver_employee_event", { event_id: input.event_id, channel: "sms" }, {\n      actor: "manager",\n      assignment_id: input.assignment_id,\n      principal_id: actor.platform_principal_id,\n      principal_class: "platform",\n      authenticated_by: actor.authenticated_by,\n    });''')
          text = text.replace('''const outcome = await runManagerTool("suppress_event_source", { account_id: input.account_id, source: input.source, event_type: input.event_type, reason: input.reason, expires_at: input.expires_at }, { actor: "manager" });''', '''const outcome = await runManagerTool("suppress_event_source", { account_id: input.account_id, source: input.source, event_type: input.event_type, reason: input.reason, expires_at: input.expires_at }, {\n      actor: "manager",\n      assignment_id: input.assignment_id,\n      principal_id: actor.platform_principal_id,\n      principal_class: "platform",\n      authenticated_by: actor.authenticated_by,\n    });''')
          path.write_text(text)
          PY
      - name: Remove one-shot workflow
        run: rm -f .github/workflows/apply-s8-admin-library-patch.yml
      - name: Commit source-only closure
        run: |
          git config user.name "amtech-s8-patch"
          git config user.email "actions@users.noreply.github.com"
          git add mvp-build/apps/manager/src/lib/admin.ts .github/workflows
          git commit -m "disable legacy admin authority and scope S8 effects"
          git push origin HEAD:employee-production-tuesday
