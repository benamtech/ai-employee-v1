name: Assistant Apply S10.1

on:
  push:
    branches:
      - employee-production-tuesday
    paths:
      - ".github/workflows/assistant-apply-s10.yml"
  pull_request:
    branches:
      - research
    paths:
      - ".github/workflows/assistant-apply-s10.yml"

permissions:
  contents: write

concurrency:
  group: assistant-apply-s10-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref || '' }}
      - name: Reconstruct reviewed payload
        shell: bash
        run: |
          set -euo pipefail
          cat .agent/s10-payload/part* > "$RUNNER_TEMP/s10-files.b64"
          echo "cb622a756442b8aef1dcccf673956d122b348dc3fcb9e5a41fd70af95e56e873  $RUNNER_TEMP/s10-files.b64" | sha256sum -c -
          base64 -d "$RUNNER_TEMP/s10-files.b64" > "$RUNNER_TEMP/s10-files.tgz"
          echo "16fa488cf693b2ead7172741b8c6a176ce98ceb8e5e4c3077edaefc742905771  $RUNNER_TEMP/s10-files.tgz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/s10-files.tgz"
      - name: Validate source contracts
        working-directory: mvp-build
        run: |
          set -euo pipefail
          npm ci
          npm run build --workspace @amtech/shared
          npm run build --workspace @amtech/db
          npm run typecheck --workspace @amtech/manager
          npx vitest run tests/unit/onboarding-identity-contract.test.ts
          npm run lint -- --quiet
      - name: Commit reviewed implementation
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .agent/s10-payload
          rm -f .github/workflows/assistant-source-snapshot.yml
          rm -f .github/workflows/assistant-apply-s10.yml
          git add -A
          git diff --cached --name-only | sort > "$RUNNER_TEMP/actual-files.txt"
          cat > "$RUNNER_TEMP/expected-files.txt" <<'FILES'
          .agent/s10-payload/part00
          .agent/s10-payload/part01
          .agent/s10-payload/part02
          .agent/s10-payload/part03
          .agent/s10-payload/part04
          .agent/s10-payload/part05
          .agent/s10-payload/part06
          .agent/s10-payload/part07
          .github/workflows/assistant-apply-s10.yml
          .github/workflows/assistant-source-snapshot.yml
          .github/workflows/lane10-integrated-ci-release-evidence.yml
          .github/workflows/s10-onboarding-identity.yml
          mvp-build/apps/manager/scripts/generate-production-server.mjs
          mvp-build/apps/manager/src/lib/onboarding-identity-provider.ts
          mvp-build/apps/manager/src/lib/onboarding-identity-routes.ts
          mvp-build/apps/manager/src/lib/onboarding-identity.ts
          mvp-build/apps/manager/src/lib/owner-session.ts
          mvp-build/apps/manager/src/server.template.ts
          mvp-build/apps/manager/src/tools/registry.ts
          mvp-build/apps/manager/src/tools/verified-provisioning.stub.ts
          mvp-build/package.json
          mvp-build/packages/db/migrations/0064_onboarding_identity_activation_authority.sql
          mvp-build/packages/shared/src/index.ts
          mvp-build/packages/shared/src/onboarding-identity.ts
          mvp-build/tests/integration/onboarding-identity-boundary.test.ts
          mvp-build/tests/unit/onboarding-identity-contract.test.ts
          FILES
          sort -o "$RUNNER_TEMP/expected-files.txt" "$RUNNER_TEMP/expected-files.txt"
          diff -u "$RUNNER_TEMP/expected-files.txt" "$RUNNER_TEMP/actual-files.txt"
          git config user.name "AMTECH Production Agent"
          git config user.email "automation@amtechai.com"
          git commit -m "feat: enforce verified onboarding identity activation"
          git push origin HEAD:employee-production-tuesday
