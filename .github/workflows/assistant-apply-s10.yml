name: Assistant Apply S10.1

on:
  pull_request:
    branches:
      - research
    paths:
      - ".github/workflows/assistant-apply-s10.yml"

permissions:
  contents: write

concurrency:
  group: assistant-apply-s10-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'employee-production-tuesday'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: employee-production-tuesday
          fetch-depth: 0
      - name: Apply reviewed archive and commit
        shell: bash
        run: |
          set -euo pipefail
          cat .agent/s10-payload/part* > "$RUNNER_TEMP/s10-files.b64"
          echo "cb622a756442b8aef1dcccf673956d122b348dc3fcb9e5a41fd70af95e56e873  $RUNNER_TEMP/s10-files.b64" | sha256sum -c -
          base64 -d "$RUNNER_TEMP/s10-files.b64" > "$RUNNER_TEMP/s10-files.tgz"
          echo "16fa488cf693b2ead7172741b8c6a176ce98ceb8e5e4c3077edaefc742905771  $RUNNER_TEMP/s10-files.tgz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/s10-files.tgz"
          rm -rf .agent/s10-payload
          rm -f .github/workflows/assistant-source-snapshot.yml
          rm -f .github/workflows/assistant-apply-s10.yml
          git add -A
          echo '--- staged status ---'
          git status --short
          echo '--- staged files ---'
          git diff --cached --name-only | sort
          test "$(git diff --cached --name-only | wc -l)" -eq 26
          test -z "$(git diff --cached --name-only | grep -Ev '^(\.agent/s10-payload/part0[0-7]|\.github/workflows/assistant-(apply-s10|source-snapshot)\.yml|\.github/workflows/(lane10-integrated-ci-release-evidence|s10-onboarding-identity)\.yml|mvp-build/apps/manager/scripts/generate-production-server\.mjs|mvp-build/apps/manager/src/lib/(onboarding-identity-provider|onboarding-identity-routes|onboarding-identity|owner-session)\.ts|mvp-build/apps/manager/src/server\.template\.ts|mvp-build/apps/manager/src/tools/(registry|verified-provisioning\.stub)\.ts|mvp-build/package\.json|mvp-build/packages/db/migrations/0064_onboarding_identity_activation_authority\.sql|mvp-build/packages/shared/src/(index|onboarding-identity)\.ts|mvp-build/tests/integration/onboarding-identity-boundary\.test\.ts|mvp-build/tests/unit/onboarding-identity-contract\.test\.ts)$' || true)"
          git config user.name "AMTECH Production Agent"
          git config user.email "automation@amtechai.com"
          git commit -m "feat: enforce verified onboarding identity activation"
          git push origin HEAD:employee-production-tuesday
