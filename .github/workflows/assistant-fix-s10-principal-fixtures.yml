name: Assistant Fix S10 Principal Fixtures

on:
  pull_request:
    branches:
      - research
    paths:
      - ".github/workflows/assistant-fix-s10-principal-fixtures.yml"

permissions:
  contents: write

jobs:
  patch-fixtures:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'employee-production-tuesday'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: employee-production-tuesday
          fetch-depth: 0
      - name: Adopt bootstrapped human principals in legacy fixtures
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          root = Path('mvp-build/tests/integration')
          replacements = {
            'authority-revocation-boundary.test.ts': (
              "on conflict (id) do update set status = 'active', credentials_revoked_at = null",
              "on conflict (user_id) do update set id = excluded.id, status = 'active', session_version = excluded.session_version, credentials_revoked_at = null",
            ),
            'ambiguous-command-reconciliation.test.ts': (
              "on conflict (id) do update set status = 'active'",
              "on conflict (user_id) do update set id = excluded.id, status = 'active'",
            ),
            'relationship-authorization-matrix.test.ts': (
              "on conflict (id) do update set status = excluded.status;\n\n      insert into employee_principals",
              "on conflict (user_id) do update set id = excluded.id, status = excluded.status;\n\n      insert into employee_principals",
            ),
            'command-effect-kernel.test.ts': (
              "on conflict (id) do update set status = excluded.status;\n\n      insert into employee_principals",
              "on conflict (user_id) do update set id = excluded.id, status = excluded.status;\n\n      insert into employee_principals",
            ),
            'signed-resource-revocation-boundary.test.ts': (
              "on conflict (id) do update set status = 'active', credentials_revoked_at = null",
              "on conflict (user_id) do update set id = excluded.id, status = 'active', credentials_revoked_at = null",
            ),
            'approval-authority-boundary.test.ts': (
              "on conflict (id) do update set status = 'active'",
              "on conflict (user_id) do update set id = excluded.id, status = 'active'",
            ),
          }
          for name, (old, new) in replacements.items():
              path = root / name
              text = path.read_text()
              start = text.index('insert into human_principals')
              suffix = text[start:]
              if old not in suffix:
                  raise SystemExit(f'missing expected fixture pattern: {name}')
              path.write_text(text[:start] + suffix.replace(old, new, 1))
          PY
          git add mvp-build/tests/integration
          test "$(git diff --cached --name-only | wc -l)" -eq 6
          test -z "$(git diff --cached --name-only | grep -v '^mvp-build/tests/integration/' || true)"
          git config user.name "AMTECH Production Agent"
          git config user.email "automation@amtechai.com"
          git commit -m "test: adopt bootstrapped human principals"
          git push origin HEAD:employee-production-tuesday
