name: Assistant Source Snapshot

on:
  push:
    branches:
      - employee-production-tuesday
    paths:
      - ".github/workflows/assistant-source-snapshot.yml"

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Archive exact source tree
        run: tar --exclude=.git -czf "$RUNNER_TEMP/ai-employee-v1-source.tgz" .
      - uses: actions/upload-artifact@v4
        with:
          name: assistant-source-${{ github.sha }}
          path: ${{ runner.temp }}/ai-employee-v1-source.tgz
          if-no-files-found: error
          retention-days: 1
