name: Employee Work Contract Autofix

on:
  push:
    branches:
      - employee-work
    paths:
      - "mvp-build/infra/scripts/employee-work-contract-fix.mjs"

permissions:
  contents: write

concurrency:
  group: employee-work-contract-autofix
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/employee-work'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: employee-work
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node mvp-build/infra/scripts/employee-work-contract-fix.mjs
      - name: Commit exact contract fixes
        run: |
          if git diff --quiet; then
            echo "No contract fixes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mvp-build/apps/manager/src/lib/provisioning-reconciler.ts \
                  mvp-build/apps/manager/src/tools/provisioning.stub.ts \
                  mvp-build/apps/manager/src/webhooks/gmail.ts
          git commit -m "Fix Manager production-boundary type contracts"
          git push origin HEAD:employee-work
