name: Employee Work Production Boundary

on:
  workflow_dispatch:
  push:
    branches:
      - employee-work
  pull_request:
    branches:
      - research
      - employee-work
    paths:
      - "mvp-build/**"
      - ".github/workflows/employee-work-production-boundary.yml"

permissions:
  contents: read

concurrency:
  group: employee-work-production-boundary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  boundary:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amtech_boundary
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amtech_boundary"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/amtech_boundary
      STAGING_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/amtech_boundary
      PGPASSWORD: postgres
    defaults:
      run:
        working-directory: mvp-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mvp-build/package-lock.json
      - run: npm ci
      - name: Bootstrap Supabase-compatible database roles
        run: |
          psql -h 127.0.0.1 -U postgres -d amtech_boundary -v ON_ERROR_STOP=1 <<'SQL'
          do $$ begin
            if not exists (select 1 from pg_roles where rolname = 'anon') then create role anon nologin; end if;
            if not exists (select 1 from pg_roles where rolname = 'authenticated') then create role authenticated nologin; end if;
            if not exists (select 1 from pg_roles where rolname = 'service_role') then create role service_role nologin bypassrls; end if;
          end $$;
          create schema if not exists auth;
          create table if not exists auth.users (id uuid primary key default gen_random_uuid(), email text);
          create or replace function auth.uid() returns uuid language sql stable as $$ select null::uuid $$;
          create or replace function auth.jwt() returns jsonb language sql stable as $$ select '{}'::jsonb $$;
          create or replace function auth.role() returns text language sql stable as $$ select current_user::text $$;
          SQL
      - name: Shared contracts
        run: |
          npm run typecheck --workspace @amtech/shared
          npm run build --workspace @amtech/shared
      - name: Database contracts
        run: |
          npm run typecheck --workspace @amtech/db
          npm run build --workspace @amtech/db
      - name: Apply and verify migration ledger
        run: |
          npm run db:migrate
          npm run db:verify:worker-migrations
          npm run test:worker-migrations
      - name: Manager and Hono contracts
        shell: bash
        run: |
          set +e
          npm run typecheck --workspace @amtech/manager 2>&1 | tee manager-typecheck.log
          status=${PIPESTATUS[0]}
          if [ "$status" -eq 0 ]; then npm run build --workspace @amtech/manager; fi
          exit "$status"
      - name: Upload Manager typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manager-typecheck-${{ github.run_id }}
          path: mvp-build/manager-typecheck.log
          if-no-files-found: error
      - name: Production boundary unit and source proofs
        env:
          HERMES_RUNTIME_COMMAND: node -e "process.exit(0)"
        run: npm run test:production-boundary
      - name: Production image inclusion
        run: docker build -f infra/deploy/manager.Dockerfile .
