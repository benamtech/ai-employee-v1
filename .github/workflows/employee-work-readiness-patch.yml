name: Employee Work Readiness Patch

on:
  push:
    branches:
      - employee-work
    paths:
      - "mvp-build/infra/scripts/employee-work-readiness-patch.mjs"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/employee-work'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: employee-work
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node mvp-build/infra/scripts/employee-work-readiness-patch.mjs
      - name: Commit readiness source patch
        run: |
          if git diff --quiet; then
            echo "No patch required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mvp-build/apps/manager/src/provisioner-host.ts
          git commit -m "Wire provisioner idempotency store and rotation recreate"
          git push origin HEAD:employee-work
