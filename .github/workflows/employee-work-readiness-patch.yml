name: Employee Work Readiness Patch

on:
  push:
    branches:
      - employee-work
    paths:
      - "mvp-build/infra/scripts/employee-work-readiness-patch.mjs"

permissions:
  contents: write

concurrency:
  group: employee-work-readiness-patch
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/employee-work'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: employee-work
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node mvp-build/infra/scripts/employee-work-readiness-patch.mjs
      - name: Commit readiness source patch
        run: |
          if git diff --quiet; then
            echo "No patch required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mvp-build/apps/manager/src/lib/ambient-inbox.ts \
                  mvp-build/packages/db/migrations/0034_reconciler_workers_and_ambient_replay.sql \
                  mvp-build/packages/db/migrations/0035_worker_terminal_claim_and_effect_receipts.sql
          git commit -m "Apply ambient inbox and worker privilege contracts"
          git push origin HEAD:employee-work
