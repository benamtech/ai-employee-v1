name: Finalize Manager Typed Source

on:
  pull_request:
    branches:
      - agent/ws05-ws06-owner-runtime
    paths:
      - "mvp-build/apps/manager/src/server.promoted.ts"
      - "mvp-build/scripts/finalize-manager-typed-source.mjs"
      - ".github/workflows/finalize-manager-typed-source.yml"

permissions:
  contents: write

concurrency:
  group: finalize-manager-typed-source-${{ github.ref }}
  cancel-in-progress: true

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify exact candidate checkout
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Finalize direct typed Manager source
        run: node mvp-build/scripts/finalize-manager-typed-source.mjs
      - name: Commit direct-source cutover
        run: |
          set -euo pipefail
          git config user.name "amtech-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "WS01 replace generated Manager mutation with typed source"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
