name: Lane 1 Relationships and Authorization

on:
  workflow_dispatch:
  push:
    branches:
      - lane/relationships-auth
      - employee-production-tuesday
    paths:
      - "mvp-build/packages/shared/src/relationship-contract.ts"
      - "mvp-build/packages/shared/src/labor-relationship-record.ts"
      - "mvp-build/packages/shared/src/authorization-scope-registry.ts"
      - "mvp-build/packages/shared/src/ids.ts"
      - "mvp-build/packages/shared/src/index.ts"
      - "mvp-build/tests/unit/relationship-contract.test.ts"
      - "mvp-build/tests/unit/authorization-scope-registry.test.ts"
      - "mvp-build/tests/integration/relationship-authorization-matrix.test.ts"
      - "mvp-build/packages/db/migrations/**"
      - ".github/workflows/lane-relationships-auth.yml"
  pull_request:
    branches:
      - research
      - employee-production-tuesday
    paths:
      - "mvp-build/packages/shared/src/relationship-contract.ts"
      - "mvp-build/packages/shared/src/labor-relationship-record.ts"
      - "mvp-build/packages/shared/src/authorization-scope-registry.ts"
      - "mvp-build/packages/shared/src/ids.ts"
      - "mvp-build/packages/shared/src/index.ts"
      - "mvp-build/tests/unit/relationship-contract.test.ts"
      - "mvp-build/tests/unit/authorization-scope-registry.test.ts"
      - "mvp-build/tests/integration/relationship-authorization-matrix.test.ts"
      - "mvp-build/packages/db/migrations/**"
      - ".github/workflows/lane-relationships-auth.yml"

permissions:
  contents: read

concurrency:
  group: lane-relationships-auth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mvp-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mvp-build/package-lock.json
      - run: npm ci
      - name: Typecheck shared relationship contracts
        run: npm run typecheck --workspace @amtech/shared
      - name: Build shared relationship contracts
        run: npm run build --workspace @amtech/shared
      - name: Run relationship and assignment-scope contract invariants
        run: npx vitest run tests/unit/relationship-contract.test.ts tests/unit/authorization-scope-registry.test.ts

  relationship-matrix:
    needs: contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amtech_relationships
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amtech_relationships"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/amtech_relationships
      STAGING_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/amtech_relationships
      PGPASSWORD: postgres
    defaults:
      run:
        working-directory: mvp-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mvp-build/package-lock.json
      - run: npm ci
      - name: Bootstrap Supabase-compatible roles and schemas
        run: |
          psql -h 127.0.0.1 -U postgres -d amtech_relationships -v ON_ERROR_STOP=1 <<'SQL'
          do $$ begin
            if not exists (select 1 from pg_roles where rolname = 'anon') then create role anon nologin; end if;
            if not exists (select 1 from pg_roles where rolname = 'authenticated') then create role authenticated nologin; end if;
            if not exists (select 1 from pg_roles where rolname = 'service_role') then create role service_role nologin bypassrls; end if;
          end $$;
          create schema if not exists auth;
          create table if not exists auth.users (id uuid primary key default gen_random_uuid(), email text);
          create or replace function auth.uid() returns uuid language sql stable as $$ select null::uuid $$;
          create or replace function auth.jwt() returns jsonb language sql stable as $$ select '{}'::jsonb $$;
          create or replace function auth.role() returns text language sql stable as $$ select current_user::text $$;
          create schema if not exists storage;
          create table if not exists storage.buckets (
            id text primary key,
            name text not null unique,
            owner uuid,
            public boolean not null default false,
            file_size_limit bigint,
            allowed_mime_types text[],
            created_at timestamptz not null default now(),
            updated_at timestamptz not null default now()
          );
          create table if not exists storage.objects (
            id uuid primary key default gen_random_uuid(),
            bucket_id text references storage.buckets(id),
            name text not null,
            owner uuid,
            metadata jsonb,
            created_at timestamptz not null default now(),
            updated_at timestamptz not null default now(),
            last_accessed_at timestamptz not null default now(),
            unique(bucket_id, name)
          );
          SQL
      - name: Apply audited baseline migrations
        run: npm run db:migrate
      - name: Execute assignment-aware relationship and RLS matrix
        shell: bash
        run: |
          set +e
          npx vitest run --config vitest.integration.config.ts tests/integration/relationship-authorization-matrix.test.ts 2>&1 | tee relationship-matrix.log
          exit ${PIPESTATUS[0]}
      - name: Upload relationship matrix diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relationship-matrix-${{ github.run_id }}
          path: mvp-build/relationship-matrix.log
          if-no-files-found: error
