name: Patch Direct Manager Contracts

on:
  pull_request:
    branches:
      - agent/ws05-ws06-owner-runtime
    paths:
      - "mvp-build/scripts/patch-direct-manager-contracts.mjs"
      - ".github/workflows/patch-direct-manager-contracts.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Apply assertion-checked direct-source patch
        run: node mvp-build/scripts/patch-direct-manager-contracts.mjs
      - name: Commit contract update
        run: |
          set -euo pipefail
          git config user.name "amtech-ci"
          git config user.email "actions@users.noreply.github.com"
          git add mvp-build/tests/unit/production-boundary-source.test.ts
          git commit -m "WS01 bind production contracts to direct Manager source"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
