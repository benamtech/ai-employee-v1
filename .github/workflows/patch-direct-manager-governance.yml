name: Patch Direct Manager Governance

on:
  pull_request:
    branches:
      - agent/ws05-ws06-owner-runtime
    paths:
      - "mvp-build/scripts/patch-direct-manager-governance.mjs"
      - ".github/workflows/patch-direct-manager-governance.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - run: node mvp-build/scripts/patch-direct-manager-governance.mjs
      - run: |
          set -euo pipefail
          git config user.name "amtech-ci"
          git config user.email "actions@users.noreply.github.com"
          git add mvp-build/scripts/verify-repository-governance.mjs
          git commit -m "WS01 enforce direct typed Manager composition"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
