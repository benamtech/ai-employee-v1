name: Patch Manager Progress Scope

on:
  pull_request:
    branches:
      - agent/ws05-ws06-owner-runtime
    paths:
      - "mvp-build/scripts/patch-manager-progress-scope.mjs"
      - ".github/workflows/patch-manager-progress-scope.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - run: node mvp-build/scripts/patch-manager-progress-scope.mjs
      - run: |
          set -euo pipefail
          git config user.name "amtech-ci"
          git config user.email "actions@users.noreply.github.com"
          git add mvp-build/apps/manager/src/server.ts
          git commit -m "WS05 scope Manager progress subscription to assignment"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
