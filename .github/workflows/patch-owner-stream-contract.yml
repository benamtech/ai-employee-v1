name: Patch Owner Stream Contract

on:
  pull_request:
    branches:
      - agent/ws05-ws06-owner-runtime
    paths:
      - "mvp-build/scripts/patch-owner-stream-contract.mjs"
      - ".github/workflows/patch-owner-stream-contract.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - run: node mvp-build/scripts/patch-owner-stream-contract.mjs
      - run: |
          set -euo pipefail
          git config user.name "amtech-ci"
          git config user.email "actions@users.noreply.github.com"
          git add mvp-build/tests/unit/production-boundary-source.test.ts
          git commit -m "WS05 bind owner stream contract to typed runtime"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
