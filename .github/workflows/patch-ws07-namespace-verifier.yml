name: Patch WS07 Namespace Verifier

on:
  pull_request:
    branches:
      - agent/ws05-ws06-owner-runtime
    paths:
      - "mvp-build/scripts/patch-ws07-namespace-verifier.mjs"
      - ".github/workflows/patch-ws07-namespace-verifier.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - run: node mvp-build/scripts/patch-ws07-namespace-verifier.mjs
      - run: |
          set -euo pipefail
          git config user.name "amtech-ci"
          git config user.email "actions@users.noreply.github.com"
          git add mvp-build/infra/scripts/acceptance/verify-commercial-effect-migrations.mjs
          git commit -m "WS03 verify rate-window namespace repair"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
