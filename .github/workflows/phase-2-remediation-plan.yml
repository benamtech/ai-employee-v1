name: Ratified Standard and Production Plan Integrity

on:
  workflow_dispatch:
  push:
    branches:
      - employee-production-tuesday
    paths:
      - "mvp-build/STANDARD.md"
      - "mvp-build/second-half-plan/**"
      - "mvp-build/docs/architecture/16-standard-research-basis-and-protocol-disposition.md"
      - "mvp-build/validation/standard-v0.2-evolution-vector.json"
      - "mvp-build/packages/shared/src/connector-setup.ts"
      - "mvp-build/apps/manager/src/lib/artifact-workbench-routes.ts"
      - "mvp-build/apps/web/app/api/employee/[employeeId]/connect/[connector]/route.ts"
      - "mvp-build/apps/web/app/agent/[employeeId]/connect/[connector]/page.tsx"
      - "mvp-build/apps/web/app/agent/[employeeId]/components/CapabilityDrawer.tsx"
      - "mvp-build/tests/unit/standard-ratification-contract.test.ts"
      - "mvp-build/tests/unit/connector-setup.test.ts"
      - "mvp-build/tests/unit/capability-drawer-setup-contract.test.ts"
      - "mvp-build/tests/unit/remediation-plan-integrity.test.ts"
      - "mvp-build/validation/phase-2-remediation-vectors.json"
      - "mvp-build/package.json"
      - "mvp-build/package-lock.json"
      - ".github/workflows/phase-2-remediation-plan.yml"
  pull_request:
    branches:
      - research
    paths:
      - "mvp-build/STANDARD.md"
      - "mvp-build/second-half-plan/**"
      - "mvp-build/docs/architecture/16-standard-research-basis-and-protocol-disposition.md"
      - "mvp-build/validation/standard-v0.2-evolution-vector.json"
      - "mvp-build/packages/shared/src/connector-setup.ts"
      - "mvp-build/apps/manager/src/lib/artifact-workbench-routes.ts"
      - "mvp-build/apps/web/app/api/employee/[employeeId]/connect/[connector]/route.ts"
      - "mvp-build/apps/web/app/agent/[employeeId]/connect/[connector]/page.tsx"
      - "mvp-build/apps/web/app/agent/[employeeId]/components/CapabilityDrawer.tsx"
      - "mvp-build/tests/unit/standard-ratification-contract.test.ts"
      - "mvp-build/tests/unit/connector-setup.test.ts"
      - "mvp-build/tests/unit/capability-drawer-setup-contract.test.ts"
      - "mvp-build/tests/unit/remediation-plan-integrity.test.ts"
      - "mvp-build/validation/phase-2-remediation-vectors.json"
      - "mvp-build/package.json"
      - "mvp-build/package-lock.json"
      - ".github/workflows/phase-2-remediation-plan.yml"

permissions:
  contents: read

concurrency:
  group: ratified-standard-production-plan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standard-plan-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mvp-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mvp-build/package-lock.json
      - run: npm ci
      - name: Validate ratified Standard, evolution vector, and connector protocol
        run: |
          # Why: governance failures must retain exact assertions before another change is attempted.
          set -o pipefail
          npm run test:standard 2>&1 | tee ratified-standard-test.log
      - name: Upload ratification diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ratified-standard-diagnostics-${{ github.sha }}
          path: mvp-build/ratified-standard-test.log
          if-no-files-found: error
          retention-days: 7
      - name: Validate predecessor remediation registry remains parseable
        run: npm run test:remediation-plan
      - name: Parse evolution vector independently
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const p = JSON.parse(fs.readFileSync('validation/standard-v0.2-evolution-vector.json', 'utf8'));
          const basis = ['expansion','satisfaction','narrowing','destructive_modification','appendix','reorientation'];
          if (p.standard_id !== 'amtech-standard-v0.2') process.exit(1);
          if (JSON.stringify(p.direction_basis) !== JSON.stringify(basis)) process.exit(1);
          if (p.summary.dimensions !== p.dimensions.length || p.dimensions.length < 12) process.exit(1);
          if (p.summary.unapproved_destructive_modifications !== 0 || p.summary.production_ready !== false) process.exit(1);
          for (const d of p.dimensions) {
            if (!d.original_clauses?.length || !d.ratified_clauses?.length) process.exit(1);
            if (!(d.implementation_refs?.length || d.supersession_refs?.length)) process.exit(1);
            if (d.direction?.destructive_modification !== 0) process.exit(1);
            for (const key of basis) if (!Number.isFinite(d.direction?.[key])) process.exit(1);
          }
          console.log({ standard: p.standard_id, dimensions: p.dimensions.length, dominant_motion: p.summary.dominant_motion });
          NODE
