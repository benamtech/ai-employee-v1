name: Phase 2 Remediation Plan Integrity

on:
  workflow_dispatch:
  push:
    branches:
      - employee-production-tuesday
    paths:
      - ".github/workflows/phase-2-remediation-plan.yml"
  pull_request:
    branches:
      - research
    paths:
      - ".github/workflows/phase-2-remediation-plan.yml"

permissions:
  contents: read

concurrency:
  group: phase-2-remediation-plan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-materialization:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Collect generator inputs without executing repository code
        run: |
          mkdir -p /tmp/manager-generator/mvp-build/apps/manager/src
          mkdir -p /tmp/manager-generator/mvp-build/apps/manager/scripts
          cp mvp-build/apps/manager/src/server.template.ts /tmp/manager-generator/mvp-build/apps/manager/src/
          cp mvp-build/apps/manager/scripts/generate-production-server.mjs /tmp/manager-generator/mvp-build/apps/manager/scripts/
      - uses: actions/upload-artifact@v4
        with:
          name: manager-generator-inputs-${{ github.sha }}
          path: /tmp/manager-generator
          if-no-files-found: error
