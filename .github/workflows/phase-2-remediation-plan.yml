name: Phase 2 Remediation Plan Integrity

on:
  workflow_dispatch:
  push:
    branches:
      - employee-production-tuesday
    paths:
      - "mvp-build/second-half-plan/phase-2-standard-remediation-execution.md"
      - "mvp-build/validation/phase-2-remediation-vectors.json"
      - "mvp-build/tests/unit/remediation-plan-integrity.test.ts"
      - "mvp-build/package.json"
      - ".github/workflows/phase-2-remediation-plan.yml"
  pull_request:
    branches:
      - research
    paths:
      - "mvp-build/second-half-plan/phase-2-standard-remediation-execution.md"
      - "mvp-build/validation/phase-2-remediation-vectors.json"
      - "mvp-build/tests/unit/remediation-plan-integrity.test.ts"
      - "mvp-build/package.json"
      - ".github/workflows/phase-2-remediation-plan.yml"

permissions:
  contents: write

concurrency:
  group: phase-2-remediation-plan-${{ github.ref }}
  cancel-in-progress: false

jobs:
  s8-direct-closure:
    if: github.repository == 'benamtech/ai-employee-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: employee-production-tuesday
          fetch-depth: 0
      - name: Apply reviewed S8 source-only closure
        run: |
          python3 - <<'PY'
          from pathlib import Path

          server = Path('mvp-build/apps/manager/src/server.ts')
          text = server.read_text()
          text = text.replace(
          '''  buildReadinessReport,\n  recordSupportAccess,\n  requirePlatformRole,\n  runAdminSupportAction,\n} from "./lib/admin.js";''',
          '''  buildReadinessReport,\n} from "./lib/admin.js";\nimport {\n  authorizePlatformAdminRequest,\n  executePlatformAdminSupportAction,\n  resolvePlatformAdminAssignment,\n} from "./lib/platform-admin-runtime.js";''')
          text = text.replace('''        assignment_id: link.assignment_id,\n        principal_id: link.resolver_principal_id,''', '''        assignment_id: String(link.assignment_id),\n        principal_id: link.resolver_principal_id,''')
          text = text.replace('''      const resolution = act === "approve" ? "approved" : "rejected";\n      const followup = await deliverApprovalResolutionFollowup(db, {''', '''      const approvalResolution = act === "approve" ? "approved" : "rejected";\n      const followup = await deliverApprovalResolutionFollowup(db, {''')
          text = text.replace('''        resolution,\n        channel: "sms",\n      });\n      resultBody = {\n        ok: true,\n        resolution,''', '''        resolution: approvalResolution,\n        channel: "sms",\n      });\n      resultBody = {\n        ok: true,\n        resolution: approvalResolution,''')
          start = text.index('  async function adminActor(')
          end = text.index('  app.post("/manager/claim/consume"', start)
          replacement = r'''  function adminAuthHeaders(c: Context) {
    return {
      authorization: c.req.header("X-AMTECH-Admin-Authorization"),
      support_lease_id: c.req.header("X-AMTECH-Support-Lease-Id"),
      legacy_identity_header_present: Boolean(c.req.header("X-AMTECH-Platform-User-Id")),
      legacy_reason_header_present: Boolean(c.req.header("X-AMTECH-Support-Reason")),
    };
  }

  async function authorizeAdminRead(c: Context, input: {
    action: string;
    action_class: "read" | "support_read";
    allowed_roles: Array<"platform_owner" | "platform_operator" | "support_readonly" | "billing_operator" | "security_reviewer">;
    account_id?: string | null;
    employee_id?: string | null;
    assignment_id?: string | null;
    require_support_lease?: boolean;
  }) {
    const denied = denyInternal(c);
    if (denied) return { denied };
    const auth = await authorizePlatformAdminRequest(serviceClient(), {
      ...adminAuthHeaders(c),
      ...input,
    });
    if (!auth.ok) return { denied: c.json({ error: auth.error }, auth.status) };
    return { actor: auth.actor };
  }

  app.get(MANAGER_API.admin.dashboard, async (c) => {
    const auth = await authorizeAdminRead(c, {
      action: "admin:dashboard:read",
      action_class: "read",
      allowed_roles: ["platform_owner", "platform_operator", "support_readonly", "billing_operator", "security_reviewer"],
    });
    if ("denied" in auth) return auth.denied;
    return c.json(await buildAdminDashboard(serviceClient()));
  });

  app.get(MANAGER_API.admin.accounts, async (c) => {
    const auth = await authorizeAdminRead(c, {
      action: "admin:accounts:list",
      action_class: "read",
      allowed_roles: ["platform_owner", "platform_operator", "support_readonly", "billing_operator", "security_reviewer"],
    });
    if ("denied" in auth) return auth.denied;
    return c.json({ accounts: (await buildAdminDashboard(serviceClient())).accounts });
  });

  app.get("/manager/admin/accounts/:accountId", async (c) => {
    const accountId = c.req.param("accountId");
    const auth = await authorizeAdminRead(c, {
      action: "admin:account:inspect",
      action_class: "support_read",
      allowed_roles: ["platform_owner", "platform_operator", "support_readonly", "billing_operator", "security_reviewer"],
      account_id: accountId,
      employee_id: null,
      assignment_id: null,
      require_support_lease: true,
    });
    if ("denied" in auth) return auth.denied;
    const detail = await buildAdminAccountDetail(serviceClient(), accountId);
    if (!detail) return c.json({ error: "account_not_found" }, 404);
    return c.json(detail);
  });

  async function employeeAdminScope(employeeId: string) {
    const db = serviceClient();
    const employee = await db.from("employees").select("id,account_id").eq("id", employeeId).maybeSingle();
    if (employee.error) throw employee.error;
    if (!employee.data?.account_id) return null;
    const assignmentId = await resolvePlatformAdminAssignment(db, {
      account_id: String(employee.data.account_id),
      employee_id: employeeId,
    });
    return { db, account_id: String(employee.data.account_id), assignment_id: assignmentId };
  }

  app.get("/manager/admin/employees/:employeeId", async (c) => {
    const employeeId = c.req.param("employeeId");
    const scope = await employeeAdminScope(employeeId);
    if (!scope) return c.json({ error: "employee_not_found" }, 404);
    const auth = await authorizeAdminRead(c, {
      action: "admin:employee:inspect",
      action_class: "support_read",
      allowed_roles: ["platform_owner", "platform_operator", "support_readonly", "security_reviewer"],
      account_id: scope.account_id,
      employee_id: employeeId,
      assignment_id: scope.assignment_id,
      require_support_lease: true,
    });
    if ("denied" in auth) return auth.denied;
    const detail = await buildAdminEmployeeDetail(scope.db, employeeId);
    if (!detail) return c.json({ error: "employee_not_found" }, 404);
    return c.json(detail);
  });

  app.get("/manager/admin/employees/:employeeId/readiness", async (c) => {
    const employeeId = c.req.param("employeeId");
    const scope = await employeeAdminScope(employeeId);
    if (!scope) return c.json({ error: "employee_not_found" }, 404);
    const auth = await authorizeAdminRead(c, {
      action: "admin:employee:readiness",
      action_class: "support_read",
      allowed_roles: ["platform_owner", "platform_operator", "support_readonly", "security_reviewer"],
      account_id: scope.account_id,
      employee_id: employeeId,
      assignment_id: scope.assignment_id,
      require_support_lease: true,
    });
    if ("denied" in auth) return auth.denied;
    const report = await buildReadinessReport(scope.db, employeeId);
    if (!report) return c.json({ error: "employee_not_found" }, 404);
    return c.json(report);
  });

  app.get("/manager/admin/environment/readiness", async (c) => {
    const auth = await authorizeAdminRead(c, {
      action: "admin:environment:readiness",
      action_class: "read",
      allowed_roles: ["platform_owner", "platform_operator", "security_reviewer"],
    });
    if ("denied" in auth) return auth.denied;
    return c.json(buildEnvironmentReadiness());
  });

  app.post(MANAGER_API.admin.supportAction, async (c) => {
    const denied = denyInternal(c);
    if (denied) return denied;
    const action = await c.req.json().catch(() => ({}));
    const result = await executePlatformAdminSupportAction(serviceClient(), {
      ...adminAuthHeaders(c),
      action,
    });
    return c.json(result.body, result.status as 200 | 400 | 401 | 403 | 409 | 410 | 503);
  });

'''
          text = text[:start] + replacement + text[end:]
          server.write_text(text)

          admin = Path('mvp-build/apps/manager/src/lib/admin.ts')
          text = admin.read_text()
          start = text.index('export async function requirePlatformRole(')
          end = text.index('function employeeHealth(', start)
          text = text[:start] + '''export async function requirePlatformRole(\n  _db: SupabaseClient,\n  _input: { platform_user_id?: string | null; minimum?: PlatformRole },\n): Promise<{ ok: true; actor: AdminActor } | { ok: false; status: number; error: string }> {\n  return { ok: false, status: 403, error: "legacy_platform_authority_disabled" };\n}\n\nexport async function recordSupportAccess(\n  _db: SupabaseClient,\n  _actor: AdminActor,\n  _input: { account_id: string; reason?: string | null; action: string; employee_id?: string | null },\n): Promise<{ ok: true; audit_id: string } | { ok: false; status: number; error: string }> {\n  return { ok: false, status: 403, error: "legacy_support_session_disabled" };\n}\n\n''' + text[end:]
          text = text.replace('''    platform_user_id: actor.platform_user_id,\n    role: actor.role,\n    account_id: input.account_id,''', '''    platform_user_id: actor.platform_user_id,\n    platform_principal_id: actor.platform_principal_id ?? null,\n    platform_session_id: actor.platform_session_id ?? null,\n    support_lease_id: actor.support_lease_id ?? null,\n    assignment_id: actor.assignment_id ?? null,\n    role: actor.role,\n    account_id: input.account_id,''')
          text = text.replace('''    account_id: input.account_id,\n    employee_id: input.employee_id ?? null,\n    actor: "manager",\n    action: `admin:${input.action}`,''', '''    account_id: input.account_id,\n    employee_id: input.employee_id ?? null,\n    assignment_id: actor.assignment_id ?? null,\n    actor: "manager",\n    action: `admin:${input.action}`,''')
          needle = '''export async function runAdminSupportAction(db: SupabaseClient, actor: AdminActor, input: AdminSupportActionInput): Promise<AdminSupportActionResult> {\n  if (!input.reason || input.reason.trim().length < 8) {'''
          replacement = '''export async function runAdminSupportAction(db: SupabaseClient, actor: AdminActor, input: AdminSupportActionInput): Promise<AdminSupportActionResult> {\n  if (!actor.platform_principal_id || !actor.platform_session_id || !actor.support_lease_id || !actor.assignment_id || !actor.authenticated_by) {\n    return { status: "denied", action: input.action, changed_resources: [], proof: { reason: "durable_platform_authority_required" }, user_facing_summary_hint: "Durable platform authority is required." };\n  }\n  if (actor.assignment_id !== input.assignment_id) {\n    return { status: "denied", action: input.action, changed_resources: [], proof: { reason: "platform_assignment_scope_mismatch" }, user_facing_summary_hint: "The support lease does not cover this assignment." };\n  }\n  if (!input.reason || input.reason.trim().length < 8 || input.reason !== actor.support_reason) {'''
          if needle not in text: raise SystemExit('runAdminSupportAction anchor missing')
          text = text.replace(needle, replacement)
          text = text.replace('''const minted = await mintEmployeeMcpCredential(db, { account_id: input.account_id, employee_id: input.employee_id! });''', '''const minted = await mintEmployeeMcpCredential(db, { account_id: input.account_id, employee_id: input.employee_id!, assignment_id: input.assignment_id });''')
          text = text.replace('''const outcome = await runManagerTool("redeliver_employee_event", { event_id: input.event_id, channel: "sms" }, { actor: "manager" });''', '''const outcome = await runManagerTool("redeliver_employee_event", { event_id: input.event_id, channel: "sms" }, {\n      actor: "manager",\n      assignment_id: input.assignment_id,\n      principal_id: actor.platform_principal_id,\n      principal_class: "platform",\n      authenticated_by: actor.authenticated_by,\n    });''')
          text = text.replace('''const outcome = await runManagerTool("suppress_event_source", { account_id: input.account_id, source: input.source, event_type: input.event_type, reason: input.reason, expires_at: input.expires_at }, { actor: "manager" });''', '''const outcome = await runManagerTool("suppress_event_source", { account_id: input.account_id, source: input.source, event_type: input.event_type, reason: input.reason, expires_at: input.expires_at }, {\n      actor: "manager",\n      assignment_id: input.assignment_id,\n      principal_id: actor.platform_principal_id,\n      principal_class: "platform",\n      authenticated_by: actor.authenticated_by,\n    });''')
          admin.write_text(text)

          authority = Path('mvp-build/packages/shared/src/platform-admin-authority.ts')
          text = authority.read_text()
          text = text.replace('''  step_up_at?: string | null;\n  expires_at: string;''', '''  step_up_at?: string | null;\n  step_up_expires_at?: string | null;\n  expires_at: string;''')
          old = '''    const stepUpAt = parsedTimestamp(input.session.step_up_at);\n    const stepUpAge = stepUpAt === null ? Number.POSITIVE_INFINITY : now.getTime() - stepUpAt;\n    if (stepUpAt === null || stepUpAge < 0 || stepUpAge > maxAge) {'''
          new = '''    const stepUpAt = parsedTimestamp(input.session.step_up_at);\n    const stepUpExpiry = parsedTimestamp(input.session.step_up_expires_at);\n    const stepUpAge = stepUpAt === null ? Number.POSITIVE_INFINITY : now.getTime() - stepUpAt;\n    if (stepUpAt === null || stepUpExpiry === null || stepUpExpiry <= now.getTime() || stepUpAge < 0 || stepUpAge > maxAge) {'''
          if old not in text: raise SystemExit('step-up anchor missing')
          authority.write_text(text.replace(old, new))

          runtime = Path('mvp-build/apps/manager/src/lib/platform-admin-runtime.ts')
          text = runtime.read_text()
          text = text.replace('''    step_up_at: sessionRow.step_up_at ? String(sessionRow.step_up_at) : null,\n    expires_at: String(sessionRow.expires_at),''', '''    step_up_at: sessionRow.step_up_at ? String(sessionRow.step_up_at) : null,\n    step_up_expires_at: sessionRow.step_up_expires_at ? String(sessionRow.step_up_expires_at) : null,\n    expires_at: String(sessionRow.expires_at),''')
          old_link = '''      await db.from("admin_action_events").update({\n        assignment_id: assignmentId,\n        platform_principal_id: auth.actor.platform_principal_id,\n        platform_session_id: auth.actor.platform_session_id,\n        support_lease_id: auth.actor.support_lease_id ?? null,\n        command_id: durableCommandId,\n      }).eq("id", result.audit_id);'''
          new_link = '''      const linked = await db.from("admin_action_events").update({\n        assignment_id: assignmentId,\n        platform_principal_id: auth.actor.platform_principal_id,\n        platform_session_id: auth.actor.platform_session_id,\n        support_lease_id: auth.actor.support_lease_id ?? null,\n        command_id: durableCommandId,\n      }).eq("id", result.audit_id);\n      if (linked.error) throw linked.error;'''
          if old_link not in text: raise SystemExit('command link anchor missing')
          text = text.replace(old_link, new_link)
          old_receipt = '''  if (execution.result.audit_id) {\n    await db.from("admin_action_events")\n      .update({ effect_receipt_id: execution.receipt_id })\n      .eq("id", execution.result.audit_id)\n      .eq("command_id", durableCommandId);\n  }'''
          new_receipt = '''  if (execution.result.audit_id) {\n    const receiptLinked = await db.from("admin_action_events")\n      .update({ effect_receipt_id: execution.receipt_id })\n      .eq("id", execution.result.audit_id)\n      .eq("command_id", durableCommandId);\n    if (receiptLinked.error) throw receiptLinked.error;\n  }'''
          if old_receipt not in text: raise SystemExit('receipt link anchor missing')
          runtime.write_text(text.replace(old_receipt, new_receipt))
          PY
      - name: Restore workflow and remove temporary workflows
        run: |
          cat > .github/workflows/phase-2-remediation-plan.yml <<'YAML'
          name: Phase 2 Remediation Plan Integrity

          on:
            workflow_dispatch:
            push:
              branches:
                - employee-production-tuesday
              paths:
                - "mvp-build/second-half-plan/phase-2-standard-remediation-execution.md"
                - "mvp-build/validation/phase-2-remediation-vectors.json"
                - "mvp-build/tests/unit/remediation-plan-integrity.test.ts"
                - "mvp-build/package.json"
                - ".github/workflows/phase-2-remediation-plan.yml"
            pull_request:
              branches:
                - research
              paths:
                - "mvp-build/second-half-plan/phase-2-standard-remediation-execution.md"
                - "mvp-build/validation/phase-2-remediation-vectors.json"
                - "mvp-build/tests/unit/remediation-plan-integrity.test.ts"
                - "mvp-build/package.json"
                - ".github/workflows/phase-2-remediation-plan.yml"

          permissions:
            contents: read

          concurrency:
            group: phase-2-remediation-plan-${{ github.ref }}
            cancel-in-progress: true

          jobs:
            plan-integrity:
              runs-on: ubuntu-latest
              timeout-minutes: 10
              defaults:
                run:
                  working-directory: mvp-build
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22
                    cache: npm
                    cache-dependency-path: mvp-build/package-lock.json
                - run: npm ci
                - name: Validate remediation registry and dependency graph
                  run: npm run test:remediation-plan
                - name: Parse machine-readable vectors independently
                  run: node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('validation/phase-2-remediation-vectors.json','utf8')); if(p.findings.length!==29) process.exit(1); console.log({plan:p.plan_id,findings:p.findings.length,contracts:p.contracts.length,lanes:p.lanes.length});"
          YAML
          rm -f \
            .github/workflows/apply-s8-direct-closure.yml \
            .github/workflows/apply-s8-server-patch.yml \
            .github/workflows/apply-s8-admin-library-patch.yml \
            .github/workflows/apply-s8-stepup-receipt-patch.yml \
            .github/workflows/materialize-s8-local-prod.yml
      - name: Commit source-only closure
        run: |
          git config user.name "amtech-s8-patch"
          git config user.email "actions@users.noreply.github.com"
          git add mvp-build/apps/manager/src/server.ts mvp-build/apps/manager/src/lib/admin.ts mvp-build/apps/manager/src/lib/platform-admin-runtime.ts mvp-build/packages/shared/src/platform-admin-authority.ts .github/workflows
          git commit -m "apply S8 durable admin source closure"
          git push origin HEAD:employee-production-tuesday

  plan-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mvp-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mvp-build/package-lock.json
      - run: npm ci
      - name: Validate remediation registry and dependency graph
        run: npm run test:remediation-plan
      - name: Parse machine-readable vectors independently
        run: node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('validation/phase-2-remediation-vectors.json','utf8')); if(p.findings.length!==29) process.exit(1); console.log({plan:p.plan_id,findings:p.findings.length,contracts:p.contracts.length,lanes:p.lanes.length});"
