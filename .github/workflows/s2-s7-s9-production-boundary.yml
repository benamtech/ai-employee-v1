name: S2 S7 S9 Production Boundary

on:
  workflow_dispatch:
  push:
    branches:
      - employee-production-tuesday
    paths:
      - "mvp-build/packages/shared/src/assignment-resolver.ts"
      - "mvp-build/packages/shared/src/session-enforcer.ts"
      - "mvp-build/packages/shared/src/approval-authority.ts"
      - "mvp-build/packages/shared/src/authority-version.ts"
      - "mvp-build/packages/shared/src/index.ts"
      - "mvp-build/packages/db/migrations/**"
      - "mvp-build/apps/manager/src/lib/owner-session.ts"
      - "mvp-build/apps/manager/src/lib/owner-assignment-authority.ts"
      - "mvp-build/apps/manager/src/lib/owner-turn-command.ts"
      - "mvp-build/apps/manager/src/lib/owner-turn-repair.ts"
      - "mvp-build/apps/manager/src/lib/mcp-auth.ts"
      - "mvp-build/apps/manager/src/lib/preview-links.ts"
      - "mvp-build/apps/manager/src/lib/approval-authority.ts"
      - "mvp-build/apps/manager/scripts/generate-production-server.mjs"
      - "mvp-build/apps/manager/scripts/production-admin-block.mjs"
      - "mvp-build/tests/unit/assignment-enforcement-contract.test.ts"
      - "mvp-build/tests/unit/owner-turn-command-contract.test.ts"
      - "mvp-build/tests/unit/approval-authority-contract.test.ts"
      - "mvp-build/tests/unit/authority-version-contract.test.ts"
      - "mvp-build/tests/integration/approval-authority-boundary.test.ts"
      - "mvp-build/tests/integration/authority-revocation-boundary.test.ts"
      - "mvp-build/tests/integration/signed-resource-revocation-boundary.test.ts"
      - "mvp-build/tests/integration/ambiguous-command-reconciliation.test.ts"
      - ".github/workflows/s2-s7-s9-production-boundary.yml"
  pull_request:
    branches:
      - research
    paths:
      - "mvp-build/packages/shared/src/assignment-resolver.ts"
      - "mvp-build/packages/shared/src/session-enforcer.ts"
      - "mvp-build/packages/shared/src/approval-authority.ts"
      - "mvp-build/packages/shared/src/authority-version.ts"
      - "mvp-build/packages/shared/src/index.ts"
      - "mvp-build/packages/db/migrations/**"
      - "mvp-build/apps/manager/src/lib/owner-session.ts"
      - "mvp-build/apps/manager/src/lib/owner-assignment-authority.ts"
      - "mvp-build/apps/manager/src/lib/owner-turn-command.ts"
      - "mvp-build/apps/manager/src/lib/owner-turn-repair.ts"
      - "mvp-build/apps/manager/src/lib/mcp-auth.ts"
      - "mvp-build/apps/manager/src/lib/preview-links.ts"
      - "mvp-build/apps/manager/src/lib/approval-authority.ts"
      - "mvp-build/apps/manager/scripts/generate-production-server.mjs"
      - "mvp-build/apps/manager/scripts/production-admin-block.mjs"
      - "mvp-build/tests/unit/assignment-enforcement-contract.test.ts"
      - "mvp-build/tests/unit/owner-turn-command-contract.test.ts"
      - "mvp-build/tests/unit/approval-authority-contract.test.ts"
      - "mvp-build/tests/unit/authority-version-contract.test.ts"
      - "mvp-build/tests/integration/approval-authority-boundary.test.ts"
      - "mvp-build/tests/integration/authority-revocation-boundary.test.ts"
      - "mvp-build/tests/integration/signed-resource-revocation-boundary.test.ts"
      - "mvp-build/tests/integration/ambiguous-command-reconciliation.test.ts"
      - ".github/workflows/s2-s7-s9-production-boundary.yml"

permissions:
  contents: read

concurrency:
  group: s2-s7-s9-production-boundary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mvp-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mvp-build/package-lock.json
      - run: npm ci
      - name: Generate canonical Manager production source
        run: npm run generate:production-sources
      - name: Typecheck and build shared contracts
        run: |
          npm run typecheck --workspace @amtech/shared
          npm run build --workspace @amtech/shared
      - name: Typecheck and build database contracts
        run: |
          npm run typecheck --workspace @amtech/db
          npm run build --workspace @amtech/db
      - name: Typecheck Manager and Hermes control-plane adapters
        run: npm run typecheck --workspace @amtech/manager
      - name: Run S2 S7 S9 unit contracts
        run: |
          npx vitest run \
            tests/unit/assignment-enforcement-contract.test.ts \
            tests/unit/owner-turn-command-contract.test.ts \
            tests/unit/approval-authority-contract.test.ts \
            tests/unit/authority-version-contract.test.ts
      - name: Verify owner assignment source spine
        run: npm run release:assignment-enforcement

  postgres-contracts:
    needs: source-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amtech_s2_s7_s9
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amtech_s2_s7_s9"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/amtech_s2_s7_s9
      STAGING_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/amtech_s2_s7_s9
      PGPASSWORD: postgres
    defaults:
      run:
        working-directory: mvp-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mvp-build/package-lock.json
      - run: npm ci
      - name: Bootstrap Supabase-compatible roles and schemas
        run: |
          psql -h 127.0.0.1 -U postgres -d amtech_s2_s7_s9 -v ON_ERROR_STOP=1 <<'SQL'
          do $$ begin
            if not exists (select 1 from pg_roles where rolname = 'anon') then create role anon nologin; end if;
            if not exists (select 1 from pg_roles where rolname = 'authenticated') then create role authenticated nologin; end if;
            if not exists (select 1 from pg_roles where rolname = 'service_role') then create role service_role nologin bypassrls; end if;
          end $$;
          create schema if not exists auth;
          create table if not exists auth.users (id uuid primary key default gen_random_uuid(), email text);
          create or replace function auth.uid() returns uuid language sql stable as $$ select null::uuid $$;
          create or replace function auth.jwt() returns jsonb language sql stable as $$ select '{}'::jsonb $$;
          create or replace function auth.role() returns text language sql stable as $$ select current_user::text $$;
          create schema if not exists storage;
          create table if not exists storage.buckets (
            id text primary key,
            name text not null unique,
            owner uuid,
            public boolean not null default false,
            file_size_limit bigint,
            allowed_mime_types text[],
            created_at timestamptz not null default now(),
            updated_at timestamptz not null default now()
          );
          create table if not exists storage.objects (
            id uuid primary key default gen_random_uuid(),
            bucket_id text references storage.buckets(id),
            name text not null,
            owner uuid,
            metadata jsonb,
            created_at timestamptz not null default now(),
            updated_at timestamptz not null default now(),
            last_accessed_at timestamptz not null default now(),
            unique(bucket_id, name)
          );
          SQL
      - name: Apply full forward migration ledger
        run: npm run db:migrate
      - name: Run S7 approval resolution and execution matrix
        run: npx vitest run --config vitest.integration.config.ts tests/integration/approval-authority-boundary.test.ts
      - name: Run S9 revocation and credential propagation matrix
        run: npx vitest run --config vitest.integration.config.ts tests/integration/authority-revocation-boundary.test.ts
      - name: Run all signed-resource revocation matrix
        shell: bash
        run: |
          set +e
          npx vitest run --config vitest.integration.config.ts tests/integration/signed-resource-revocation-boundary.test.ts 2>&1 | tee signed-resource-revocation.log
          exit ${PIPESTATUS[0]}
      - name: Upload signed-resource diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signed-resource-revocation-${{ github.run_id }}
          path: mvp-build/signed-resource-revocation.log
          if-no-files-found: error
      - name: Run C3 ambiguous Hermes-turn reconciliation matrix
        run: npx vitest run --config vitest.integration.config.ts tests/integration/ambiguous-command-reconciliation.test.ts
