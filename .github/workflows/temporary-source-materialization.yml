name: Temporary Source Materialization

on:
  push:
    branches:
      - employee-production-tuesday
  pull_request:
    branches:
      - research
    paths:
      - "mvp-build/**"
      - ".github/workflows/temporary-source-materialization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: manager-source-${{ github.sha }}
          path: |
            mvp-build/apps/manager/src/server.ts
            mvp-build/apps/manager/src/lib/employee-stream.ts
            mvp-build/apps/manager/src/lib/runtime.ts
            mvp-build/apps/manager/src/lib/turn-queue.ts
            mvp-build/apps/manager/src/lib/run-tool.ts
            mvp-build/apps/manager/src/lib/owner-session.ts
            mvp-build/apps/manager/src/middleware/assignment-guard.ts
            mvp-build/apps/manager/src/webhooks/twilio.ts
          if-no-files-found: error
          retention-days: 1
