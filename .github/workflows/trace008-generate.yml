name: Trace008 Generate

on:
  push:
    branches:
      - agent/ws08-ws09-production
    paths:
      - mvp-build/decision/trace008/prior_model.json
      - mvp-build/decision/trace008/compute.py
      - .github/workflows/trace008-generate.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trace008-generate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Assert candidate branch
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          test "${GITHUB_REF_NAME}" = "agent/ws08-ws09-production"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Generate and verify Trace008
        working-directory: mvp-build
        run: |
          set -euo pipefail
          python decision/trace008/compute.py --write | tee /tmp/trace008-generate.log
          python decision/trace008/compute.py --verify | tee /tmp/trace008-verify.log
          test -s decision/trace008/selected_implementation.json
          test -s decision/trace008/selection_comparison.json
          test -s decision/trace008/verification_plan.json
      - name: Commit generated public artifacts
        run: |
          set -euo pipefail
          git config user.name "amtech-trace-bot"
          git config user.email "actions@users.noreply.github.com"
          git add mvp-build/decision/trace008
          if git diff --cached --quiet; then
            echo "Trace008 artifacts already current."
            exit 0
          fi
          git commit -m "decision(trace008): generate computed public artifacts"
          git push origin HEAD:agent/ws08-ws09-production
