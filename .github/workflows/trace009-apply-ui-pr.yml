name: Trace009 Apply UI PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - mvp-build/scripts/apply-trace009-ui-consolidation.mjs
      - mvp-build/apps/web/app/ui-lab/**
      - mvp-build/apps/web/app/agent/**
      - .github/workflows/trace009-apply-ui-pr.yml

permissions:
  contents: write

concurrency:
  group: trace009-apply-ui-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/ws08-ws09-production'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Assert exact PR head
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - name: Apply assertion-checked consolidation
        working-directory: mvp-build
        run: |
          set -euo pipefail
          node scripts/apply-trace009-ui-consolidation.mjs
          node scripts/generate-ui-coverage.mjs validation/ui-presentation-coverage.json
      - name: Commit exact derived changes
        run: |
          set -euo pipefail
          git config user.name "amtech-trace-bot"
          git config user.email "actions@users.noreply.github.com"
          git add mvp-build/apps/web/app/agent mvp-build/apps/web/app/ui-lab mvp-build/validation/ui-presentation-coverage.json
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "Trace009 UI consolidation already applied."
            exit 0
          fi
          git commit -m "ui(trace009): consolidate production projection path"
          git push origin HEAD:agent/ws08-ws09-production
