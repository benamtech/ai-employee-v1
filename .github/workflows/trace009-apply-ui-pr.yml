name: Trace009 Apply UI PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - mvp-build/scripts/apply-trace009-ui-consolidation.mjs
      - mvp-build/apps/web/app/ui-lab/**
      - mvp-build/apps/web/app/agent/**
      - .github/workflows/trace009-apply-ui-pr.yml

permissions:
  contents: write

concurrency:
  group: trace009-apply-ui-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/ws08-ws09-production'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Assert exact PR head
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - name: Apply assertion-checked consolidation
        working-directory: mvp-build
        run: |
          set -euo pipefail
          node scripts/apply-trace009-ui-consolidation.mjs 2>&1 | tee ../trace009-ui-transform.log
          node scripts/generate-ui-coverage.mjs validation/ui-presentation-coverage.json 2>&1 | tee -a ../trace009-ui-transform.log
      - name: Retain transform diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace009-ui-transform-${{ github.event.pull_request.head.sha }}
          path: trace009-ui-transform.log
          if-no-files-found: error
          retention-days: 3
      - name: Retain exact transformed source
        uses: actions/upload-artifact@v4
        with:
          name: trace009-ui-source-${{ github.event.pull_request.head.sha }}
          path: |
            mvp-build/apps/web/app/agent/[employeeId]/AgentSurface.tsx
            mvp-build/apps/web/app/agent/[employeeId]/LiveEmployeeOperatingShell.tsx
            mvp-build/validation/ui-presentation-coverage.json
          if-no-files-found: error
          retention-days: 3
      - name: Validate derived diff
        run: |
          set -euo pipefail
          git add mvp-build/apps/web/app/agent mvp-build/apps/web/app/ui-lab mvp-build/validation/ui-presentation-coverage.json
          git diff --cached --check
          git diff --cached --stat
