name: Trace009 Apply UI Consolidation

on:
  push:
    branches:
      - agent/ws08-ws09-production
    paths:
      - mvp-build/scripts/apply-trace009-ui-consolidation.mjs
      - mvp-build/scripts/generate-ui-coverage.mjs
      - .github/workflows/trace009-apply-ui.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trace009-apply-ui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ws08-ws09-production
          fetch-depth: 0
      - name: Assert migration branch
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "agent/ws08-ws09-production"
      - name: Apply assertion-checked transformation
        working-directory: mvp-build
        run: |
          set -euo pipefail
          node scripts/apply-trace009-ui-consolidation.mjs
          node scripts/generate-ui-coverage.mjs validation/ui-presentation-coverage.json
      - name: Commit transformed source and generated coverage
        run: |
          set -euo pipefail
          git config user.name "amtech-trace-bot"
          git config user.email "actions@users.noreply.github.com"
          git add mvp-build/apps/web/app/agent mvp-build/apps/web/app/ui-lab mvp-build/validation/ui-presentation-coverage.json
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "Trace009 UI consolidation already applied."
            exit 0
          fi
          git commit -m "ui(trace009): consolidate production projection path"
          git push origin HEAD:agent/ws08-ws09-production
