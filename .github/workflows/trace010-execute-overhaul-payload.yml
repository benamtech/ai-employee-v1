name: Trace010 Exact-Head Repository Gates

on:
  pull_request:
    branches:
      - agent/ws08-ws09-production
    paths:
      - '.github/workflows/trace010-execute-overhaul-payload.yml'
      - 'mvp-build/**'
      - '.overhaul-payload/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trace010-exact-head-repository-gates-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  repository-gates:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Assert exact input head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - name: Install dependencies
        working-directory: mvp-build
        run: npm ci
      - name: Run agentic check
        id: agentic
        continue-on-error: true
        working-directory: mvp-build
        run: npm run repo:agentic:check
      - name: Run full repository verification
        id: full
        continue-on-error: true
        working-directory: mvp-build
        run: npm run repo:verify:full
      - name: Run unit suite
        id: unit
        continue-on-error: true
        working-directory: mvp-build
        run: npm run test:unit
      - name: Enforce aggregate result
        if: always()
        run: |
          echo "agentic=${{ steps.agentic.outcome }}"
          echo "full=${{ steps.full.outcome }}"
          echo "unit=${{ steps.unit.outcome }}"
          test "${{ steps.agentic.outcome }}" = success
          test "${{ steps.full.outcome }}" = success
          test "${{ steps.unit.outcome }}" = success
