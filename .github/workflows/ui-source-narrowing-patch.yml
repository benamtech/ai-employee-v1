name: UI Source Narrowing Patch

on:
  push:
    branches: [employee-production-tuesday]
    paths: [".github/workflows/ui-source-narrowing-patch.yml"]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: employee-production-tuesday
      - name: Apply exact narrowing patch
        shell: python
        run: |
          from pathlib import Path
          path = Path("mvp-build/apps/manager/src/lib/operating-surface.ts")
          source = path.read_text()
          before = '''  const blocked = input.loops.filter((loop) => loop.state === "blocked" || loop.state === "failed");
          if (blocked.length) return {
            headline: `${employee} is blocked on ${blocked[0].title}`,
            summary: blocked[0].summary ?? "The employee preserved the work and is waiting for a dependency, repair, or owner input.",'''
          after = '''  const blocked = input.loops.filter((loop) => loop.state === "blocked" || loop.state === "failed");
          const firstBlocked = blocked[0];
          if (firstBlocked) return {
            headline: `${employee} is blocked on ${firstBlocked.title}`,
            summary: firstBlocked.summary ?? "The employee preserved the work and is waiting for a dependency, repair, or owner input.",'''
          if source.count(before) != 1:
              raise SystemExit(f"expected one exact source match, found {source.count(before)}")
          path.write_text(source.replace(before, after))
      - name: Commit source-only patch
        run: |
          git config user.name "amtech-ui-bot"
          git config user.email "actions@users.noreply.github.com"
          git add mvp-build/apps/manager/src/lib/operating-surface.ts
          test "$(git diff --cached --name-only)" = "mvp-build/apps/manager/src/lib/operating-surface.ts"
          git commit -m "fix(ui): narrow blocked operating loop"
          git push origin HEAD:employee-production-tuesday
