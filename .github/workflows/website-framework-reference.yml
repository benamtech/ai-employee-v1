name: Website Framework Reference

on:
  pull_request:
    paths:
      - "GTM-RESEARCH/website-framework/**"
      - ".github/workflows/website-framework-reference.yml"
  push:
    branches: [main, research, "agent/**"]
    paths:
      - "GTM-RESEARCH/website-framework/**"
      - ".github/workflows/website-framework-reference.yml"

jobs:
  reference:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GTM-RESEARCH/website-framework/reference
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: GTM-RESEARCH/website-framework/reference/package.json
      - run: npm install --no-audit --no-fund
      - run: npm test
      - run: npm run manifest:emit
      - uses: actions/upload-artifact@v4
        with:
          name: website-framework-manifest-emissions
          path: GTM-RESEARCH/website-framework/reference/generated-manifest
          retention-days: 7
