name: WS07 WS08 Commercial Effect

on:
  workflow_dispatch:
  pull_request:
    branches:
      - research
      - agent/ws05-ws06-owner-runtime
    paths:
      - "AGENTS.md"
      - "CLAUDE.md"
      - "CONTRIBUTING.md"
      - "CODEGRAPH.md"
      - "mvp-build/AGENTS.md"
      - "mvp-build/CLAUDE.md"
      - "mvp-build/CODEGRAPH.md"
      - "mvp-build/README.md"
      - "mvp-build/STANDARD.md"
      - "mvp-build/STANDARD-V0.2-AMENDMENT-001.md"
      - "mvp-build/validation/standard-v0.2-amendment-001-evolution.json"
      - "mvp-build/GAPS.md"
      - "mvp-build/REMEDIATION.md"
      - "mvp-build/apps/manager/src/lib/model-gateway*.ts"
      - "mvp-build/apps/manager/src/lib/commercial*.ts"
      - "mvp-build/apps/manager/src/lib/effect-proof-projection.ts"
      - "mvp-build/apps/manager/src/tools/artifact-workbench-tools.ts"
      - "mvp-build/packages/db/migrations/0074_*.sql"
      - "mvp-build/packages/db/migrations/0075_*.sql"
      - "mvp-build/packages/db/migrations/0076_*.sql"
      - "mvp-build/packages/db/migration-ledger.mjs"
      - "mvp-build/tests/unit/ws07-commercial-admission.test.ts"
      - "mvp-build/tests/unit/ws06-ws08-failure-manifold.test.ts"
      - "mvp-build/tests/unit/model-gateway-http-isolation.test.ts"
      - "mvp-build/tests/integration/ws07-commercial-ledger.test.ts"
      - "mvp-build/decision/**"
      - "mvp-build/docs/architecture/**"
      - "mvp-build/production-readiness-program/**"
      - "mvp-build/second-half-plan/README.md"
      - "mvp-build/memory/**"
      - "mvp-build/scripts/verify-repository-governance.mjs"
      - "mvp-build/infra/scripts/acceptance/verify-commercial-effect-migrations.mjs"
      - "mvp-build/infra/scripts/acceptance/migration-staging-live-proof.mjs"
      - "mvp-build/package.json"
      - ".github/workflows/ws07-ws08-commercial-effect.yml"

permissions:
  contents: read

env:
  CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

concurrency:
  group: ws07-ws08-commercial-effect-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-and-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: mvp-build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}
      - name: Verify exact candidate checkout
        run: test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
        working-directory: .
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mvp-build/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - name: Verify corrected decision matrix
        id: decision-matrix
        continue-on-error: true
        run: |
          set -euo pipefail
          {
            echo "candidate_sha=$CANDIDATE_SHA"
            python -m pip install --disable-pip-version-check numpy==2.1.3
            python decision/trace007/compute.py
          } 2>&1 | tee trace007-verification.log
      - name: Retain decision verification output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace007-verification-${{ env.CANDIDATE_SHA }}
          path: mvp-build/trace007-verification.log
          if-no-files-found: error
          retention-days: 14
      - name: Enforce decision matrix result
        if: steps.decision-matrix.outcome == 'failure'
        run: exit 1
      - name: Run source and unit matrix
        id: source-matrix
        continue-on-error: true
        run: |
          set -euo pipefail
          {
            echo "candidate_sha=$CANDIDATE_SHA"
            echo "== structural repository governance =="
            npm run test:repo-governance
            echo "== canonical production source generation =="
            npm run generate:production-sources
            echo "== affected workspace typechecks =="
            npm run build --workspace @amtech/shared
            npm run typecheck --workspace @amtech/shared
            npm run build --workspace @amtech/db
            npm run typecheck --workspace @amtech/db
            npm run typecheck --workspace @amtech/manager
            echo "== focused WS-07/08 behavioral unit boundary =="
            npx vitest run tests/unit/ws07-commercial-admission.test.ts tests/unit/ws06-ws08-failure-manifold.test.ts tests/unit/model-gateway-http-isolation.test.ts tests/unit/artifact-workbench-contract.test.ts
            echo "== migration ledger and quick repository contracts =="
            node packages/db/migration-ledger.mjs
            npm run repo:verify:quick
          } 2>&1 | tee source-and-unit.log
      - name: Retain source and unit output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-and-unit-${{ env.CANDIDATE_SHA }}
          path: mvp-build/source-and-unit.log
          if-no-files-found: error
          retention-days: 14
      - name: Enforce source and unit result
        if: steps.source-matrix.outcome == 'failure'
        run: exit 1

  broad-local-matrix:
    needs: source-and-unit
    runs-on: ubuntu-latest
    timeout-minutes: 55
    defaults:
      run:
        working-directory: mvp-build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}
      - name: Verify exact candidate checkout
        run: test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
        working-directory: .
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mvp-build/package-lock.json
      - run: npm ci
      - name: Run complete broad local matrix
        id: broad-matrix
        continue-on-error: true
        run: |
          set -euo pipefail
          {
            echo "candidate_sha=$CANDIDATE_SHA"
            echo "== full repository verification =="
            npm run repo:verify:full
            echo "== complete unit regression =="
            npm run test:unit
            echo "== all production workspace build =="
            npm run build
          } 2>&1 | tee broad-local-matrix.log
      - name: Retain broad local output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: broad-local-matrix-${{ env.CANDIDATE_SHA }}
          path: mvp-build/broad-local-matrix.log
          if-no-files-found: error
          retention-days: 14
      - name: Enforce broad local result
        if: steps.broad-matrix.outcome == 'failure'
        run: exit 1

  postgres-integration:
    needs: source-and-unit
    runs-on: ubuntu-latest
    timeout-minutes: 55
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amtech_ws07_ws08
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amtech_ws07_ws08"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/amtech_ws07_ws08
      STAGING_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/amtech_ws07_ws08
      PGPASSWORD: postgres
    defaults:
      run:
        working-directory: mvp-build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}
      - name: Verify exact candidate checkout
        run: test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
        working-directory: .
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mvp-build/package-lock.json
      - run: npm ci
      - name: Run complete PostgreSQL matrix
        id: postgres-matrix
        continue-on-error: true
        run: |
          set -euo pipefail
          {
            echo "candidate_sha=$CANDIDATE_SHA"
            echo "== bootstrap Supabase-compatible roles and schemas =="
            psql -h 127.0.0.1 -U postgres -d amtech_ws07_ws08 -v ON_ERROR_STOP=1 <<'SQL'
            do $$ begin
              if not exists (select 1 from pg_roles where rolname = 'anon') then create role anon nologin; end if;
              if not exists (select 1 from pg_roles where rolname = 'authenticated') then create role authenticated nologin; end if;
              if not exists (select 1 from pg_roles where rolname = 'service_role') then create role service_role nologin bypassrls; end if;
            end $$;
            create schema if not exists auth;
            create table if not exists auth.users (id uuid primary key default gen_random_uuid(), email text);
            create or replace function auth.uid() returns uuid language sql stable as $$ select null::uuid $$;
            create or replace function auth.jwt() returns jsonb language sql stable as $$ select '{}'::jsonb $$;
            create or replace function auth.role() returns text language sql stable as $$ select current_user::text $$;
            create schema if not exists storage;
            create table if not exists storage.buckets (
              id text primary key, name text not null unique, owner uuid, public boolean not null default false,
              file_size_limit bigint, allowed_mime_types text[], created_at timestamptz not null default now(), updated_at timestamptz not null default now()
            );
            create table if not exists storage.objects (
              id uuid primary key default gen_random_uuid(), bucket_id text references storage.buckets(id), name text not null,
              owner uuid, metadata jsonb, created_at timestamptz not null default now(), updated_at timestamptz not null default now(),
              last_accessed_at timestamptz not null default now(), unique(bucket_id, name)
            );
            SQL
            echo "== apply immutable migration ledger =="
            npm run db:migrate
            echo "== verify WS-07/08 schema authority =="
            npm run db:verify:commercial-effect-migrations
            echo "== focused behavioral PostgreSQL ledger matrix =="
            npx vitest run --config vitest.integration.config.ts tests/integration/ws07-commercial-ledger.test.ts
            echo "== complete PostgreSQL integration aggregate =="
            npm run test:integration
          } 2>&1 | tee postgres-integration.log
      - name: Retain PostgreSQL output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgres-integration-${{ env.CANDIDATE_SHA }}
          path: mvp-build/postgres-integration.log
          if-no-files-found: error
          retention-days: 14
      - name: Enforce PostgreSQL result
        if: steps.postgres-matrix.outcome == 'failure'
        run: exit 1
