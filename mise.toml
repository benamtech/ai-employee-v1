[tools]
node = "22.17.0"
pnpm = "10.12.1"
python = "3.12.11"

[env]
NODE_ENV = "production"
LOCAL_PROD_BUILD_BUDGET_SECONDS = "30"
LOCAL_PROD_BUILD_MAX_RSS_MB = "4096"
LOCAL_PROD_BUILD_MAX_ARTIFACT_MB = "100"
LOCAL_PROD_TEST_BUDGET_SECONDS = "10"
LOCAL_PROD_TEST_MAX_RSS_MB = "4096"
LOCAL_PROD_DEV_BUDGET_SECONDS = "5"

[tasks.install]
description = "Install root orchestration and canonical application dependencies"
run = [
  "pnpm install --frozen-lockfile",
  "npm --prefix mvp-build ci"
]

[tasks.verify]
description = "Run the source/local S1-S8 verification gate without starting services"
run = "pnpm verify"

[tasks.local-prod]
description = "Start the prebuilt exact-SHA production topology locally"
run = "pnpm dev"
