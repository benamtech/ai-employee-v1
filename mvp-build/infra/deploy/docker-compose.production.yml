name: amtech-ai-employee

services:
  manager:
    container_name: amtech-manager
    image: amtech-ai-employee-manager:${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    build:
      context: ../..
      dockerfile: infra/deploy/manager.Dockerfile
      args:
        AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      PORT: "8080"
      AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
      PROVISIONER_SOCKET_PATH: /run/amtech-provisioner/provisioner.sock
      DOCKER_MANAGER_API_ORIGIN: http://amtech-manager:8080
      MODEL_GATEWAY_EMPLOYEE_BASE_URL: http://amtech-model-gateway:8092/v1
    volumes:
      - /var/lib/amtech:/var/lib/amtech
      - provisioner_socket:/run/amtech-provisioner
    networks:
      - amtech_control
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    depends_on:
      model-gateway:
        condition: service_healthy
      host-provisioner:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

  model-gateway:
    container_name: amtech-model-gateway
    image: amtech-ai-employee-model-gateway:${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    build:
      context: ../..
      dockerfile: infra/deploy/model-gateway.Dockerfile
      args:
        AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
      MODEL_GATEWAY_HOST: "0.0.0.0"
      MODEL_GATEWAY_PORT: "8092"
    networks:
      - amtech_control
    ports:
      - "127.0.0.1:8092:8092"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8092/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

  host-provisioner:
    container_name: amtech-host-provisioner
    image: amtech-ai-employee-host-provisioner:${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    build:
      context: ../..
      dockerfile: infra/deploy/provisioner.Dockerfile
      args:
        AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
      PROVISIONER_SOCKET_PATH: /run/amtech-provisioner/provisioner.sock
      PROVISIONER_AUDIT_LOG: /var/lib/amtech/audit/host-provisioner.jsonl
      MANAGER_CONTAINER_NAME: amtech-manager
      MODEL_GATEWAY_CONTAINER_NAME: amtech-model-gateway
      CADDY_EMPLOYEE_UPSTREAM_HOST: localhost
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/amtech:/var/lib/amtech
      - /var/lib/amtech/caddy/clients:/etc/caddy/clients
      - provisioner_socket:/run/amtech-provisioner
    networks:
      - amtech_control
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/amtech-provisioner/provisioner.sock"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

  web:
    container_name: amtech-web
    image: amtech-ai-employee-web:${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    build:
      context: ../..
      dockerfile: infra/deploy/web.Dockerfile
      args:
        AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    networks:
      - amtech_control
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    depends_on:
      manager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

  # Production Caddy deliberately shares the Linux host network. The public proxy
  # must reach Web, Manager, Model Gateway, and employee Hermes gateways through
  # host-loopback ports. Its health is the aggregate five-service release health,
  # not merely a successful Caddyfile parse.
  caddy:
    container_name: amtech-caddy
    image: amtech-ai-employee-caddy:${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    build:
      context: ../..
      dockerfile: infra/deploy/caddy.Dockerfile
      args:
        AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    env_file:
      - ./.env.production
    environment:
      WEB_UPSTREAM: ${WEB_UPSTREAM:-127.0.0.1:3000}
      MANAGER_UPSTREAM: ${MANAGER_UPSTREAM:-127.0.0.1:8080}
      AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    volumes:
      - ../caddy/production.Caddyfile:/etc/caddy/Caddyfile:ro
      - /var/lib/amtech/caddy/clients:/etc/caddy/clients
      - caddy_data:/data
      - caddy_config:/config
    network_mode: host
    restart: unless-stopped
    depends_on:
      manager:
        condition: service_healthy
      model-gateway:
        condition: service_healthy
      host-provisioner:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "caddy validate --config /etc/caddy/Caddyfile >/dev/null && wget -q -T 5 -O /dev/null http://127.0.0.1:8080/health && wget -q -T 5 -O /dev/null http://127.0.0.1:8092/health && wget -q -T 5 -O /dev/null http://127.0.0.1:3000"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 30s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

networks:
  amtech_control:
    name: amtech_control

volumes:
  caddy_data:
  caddy_config:
  provisioner_socket:
