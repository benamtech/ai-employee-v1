name: amtech-ai-employee

services:
  manager:
    image: amtech-ai-employee-manager:${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    build:
      context: ../..
      dockerfile: infra/deploy/manager.Dockerfile
      args:
        AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      PORT: "8080"
      AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
      PROVISIONER_SOCKET_PATH: /run/amtech-provisioner/provisioner.sock
      MODEL_GATEWAY_EMPLOYEE_BASE_URL: ${MODEL_GATEWAY_EMPLOYEE_BASE_URL:-http://host.docker.internal:8092/v1}
    volumes:
      - /var/lib/amtech:/var/lib/amtech
      - provisioner_socket:/run/amtech-provisioner
    networks:
      - amtech_control
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

  model-gateway:
    image: amtech-ai-employee-manager:${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    build:
      context: ../..
      dockerfile: infra/deploy/manager.Dockerfile
      args:
        AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    command: ["node", "apps/manager/dist/model-gateway-server.js"]
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
      MODEL_GATEWAY_HOST: "0.0.0.0"
      MODEL_GATEWAY_PORT: "8092"
    networks:
      - amtech_control
    ports:
      - "127.0.0.1:8092:8092"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8092/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

  host-provisioner:
    image: amtech-ai-employee-provisioner:${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    build:
      context: ../..
      dockerfile: infra/deploy/provisioner.Dockerfile
      args:
        AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
      PROVISIONER_SOCKET_PATH: /run/amtech-provisioner/provisioner.sock
      PROVISIONER_AUDIT_LOG: /var/lib/amtech/audit/host-provisioner.jsonl
      CADDY_ADMIN_ORIGIN: http://caddy:2019
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/amtech:/var/lib/amtech
      - /var/lib/amtech/caddy/clients:/etc/caddy/clients
      - provisioner_socket:/run/amtech-provisioner
    networks:
      - amtech_control
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/amtech-provisioner/provisioner.sock"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

  web:
    image: amtech-ai-employee-web:${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    build:
      context: ../..
      dockerfile: infra/deploy/web.Dockerfile
      args:
        AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    networks:
      - amtech_control
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    depends_on:
      manager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: amtech-ai-employee-caddy:${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    build:
      context: ../..
      dockerfile: infra/deploy/caddy.Dockerfile
      args:
        AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    env_file:
      - ./.env.production
    environment:
      WEB_UPSTREAM: ${WEB_UPSTREAM:-web:3000}
      MANAGER_UPSTREAM: ${MANAGER_UPSTREAM:-manager:8080}
      AMTECH_GIT_SHA: ${AMTECH_GIT_SHA:?AMTECH_GIT_SHA is required}
    volumes:
      - ../caddy/production.Caddyfile:/etc/caddy/Caddyfile:ro
      - /var/lib/amtech/caddy/clients:/etc/caddy/clients
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - amtech_control
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    depends_on:
      manager:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

networks:
  amtech_control:
    name: amtech_control

volumes:
  caddy_data:
  caddy_config:
  provisioner_socket:
