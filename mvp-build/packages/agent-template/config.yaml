# Hermes profile config (template) — rendered per client by provision_employee.
# Spec: product-ai-employee-context.md ("the architecture, as built").

profile:
  id: "client_{{CLIENT_ID}}"
  name: "{{EMPLOYEE_NAME}}"

# Model — rendered per employee by profile-renderer. Production ships
# claude-opus-4-8; local no-key testing (HERMES_MODEL_PROVIDER=custom) points this
# at the agent-in-the-loop bridge so the warm Haiku worker is the LLM. See
# infra/local/agent-model-bridge.md.
{{MODEL_CONFIG}}

terminal:
  # Hermes' own terminal/file execution backend. The employee already runs inside
  # its Manager-provided isolation runtime (a Docker container), so Hermes executes
  # in-process ("local") — the container IS the sandbox. Nesting Docker here would
  # need a socket that isn't mounted and silently gates terminal/file tools off.
  # The Manager's runtime_backend (docker) remains the real blast-radius tier.
  backend: "{{TERMINAL_BACKEND}}"
  home_mode: "profile"
  cwd: "{{WORKSPACE_DIR}}"

# Toolsets Hermes exposes to this employee on the api_server platform. Without
# this block Hermes falls back to terminal/file/web only (a nearly tool-less
# frontier agent). Rendered per employee from the safe-set policy in
# packages/shared/src/platform-toolsets.ts — tied to runtime-backend blast
# radius + provider-key availability. Money/customer-facing safety stays
# enforced by the Manager approval gate, never by omitting a tool here.
platform_toolsets:
  api_server: {{PLATFORM_TOOLSETS}}

# The AMTECH Manager control plane, exposed to this employee as a native MCP
# server. Enabled mcp_servers auto-attach to the api_server platform's tools
# (Hermes tools_config), so the employee calls Manager tools (estimates,
# approvals, connectors, reminders) natively instead of parsing a prose HTTP
# contract. Auth rides the internal bearer via headers; the streamable-http URL
# is the Manager's /manager/mcp endpoint.
mcp_servers:
  amtech_manager:
    url: "{{MANAGER_MCP_URL}}"
    headers:
      # Auth bearer + the employee's bound identity. The Manager injects
      # account_id/employee_id into every tool call from these headers, so the
      # model never sees or supplies them (they are stripped from the advertised
      # tool schemas). Rendered per employee; not model-controlled.
      Authorization: "Bearer {{MANAGER_INTERNAL_TOKEN}}"
      X-AMTECH-Account-Id: "{{ACCOUNT_ID}}"
      X-AMTECH-Employee-Id: "{{EMPLOYEE_ID}}"

gateway:
  sms:
    # Manager owns Twilio ingress, sender identity, delivery decisions, and approval gates.
    enabled: false

# tool_progress off for SMS — acknowledge, then deliver; never narrate tool steps.
ui:
  tool_progress: "off"
