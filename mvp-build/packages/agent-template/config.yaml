# Hermes profile config (template) — rendered per client by provision_employee.
# Spec: product-ai-employee-context.md ("the architecture, as built").

profile:
  id: "client_{{CLIENT_ID}}"
  name: "{{EMPLOYEE_NAME}}"

model:
  # Preselect the model/provider during provisioning so every employee skips the
  # first-run Hermes setup wizard. Provider credentials are injected at container
  # runtime by the local/VPS launcher, not written into this config file.
  provider: "{{HERMES_MODEL_PROVIDER}}"
  default: "{{HERMES_MODEL_DEFAULT}}"
  base_url: "{{HERMES_MODEL_BASE_URL}}"

models:
  # Shipped default employee model; haiku for compression/background work.
  default: "{{HERMES_MODEL_DEFAULT}}"
  compression: "claude-haiku-4-5"

terminal:
  # Docker is the production and production-like local/VPS default. `local` is dev/demo only.
  backend: "{{RUNTIME_BACKEND}}"
  home_mode: "profile"
  cwd: "{{WORKSPACE_DIR}}"

gateway:
  sms:
    # Manager owns Twilio ingress, sender identity, delivery decisions, and approval gates.
    enabled: false

# tool_progress off for SMS — acknowledge, then deliver; never narrate tool steps.
ui:
  tool_progress: "off"
